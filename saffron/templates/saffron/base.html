{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="saffron">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFFRON</title>
    <script>
        (function () {
            var t = localStorage.getItem('saffron-theme');
            if (t === 'green' || t === 'saffron' || t === 'scientific') {
                document.documentElement.setAttribute('data-theme', t);
            } else if (t === 'amber') {
                /* migrate old default */
                document.documentElement.setAttribute('data-theme', 'saffron');
            }
        })();
    </script>
    <link rel="stylesheet" href="{% static 'designer/style.css' %}">
    <link rel="stylesheet" href="{% static 'saffron/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="saffron-body">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>
    <header class="site-header saffron-header">
        <div class="container header-inner header-inner-tools">
            <div class="header-brand-col">
                <a href="{% url 'home' %}" class="app-switch" title="Switch to AMBER Designer">← AMBER</a>
                <a href="{% url 'saffron_home' %}" class="site-brand" title="SAFFRON home">
                    <h1 style="letter-spacing: 0.08em; margin: 0;">SAFFRON</h1>
                    <p style="margin: 0.1rem 0 0 0; opacity: 0.92; letter-spacing: 0.04em; font-size: 0.82rem; max-width: 28rem; line-height: 1.35;">
                        <strong>S</strong>ignal-peptide <strong>A</strong>ssessment <strong>F</strong>ramework
                        <strong>F</strong>or <strong>R</strong>anking <strong>O</strong>f <strong>N</strong>-terminal edits
                    </p>
                </a>
            </div>
            <div class="header-actions">
                <div class="theme-switcher" role="group" aria-label="Color theme">
                    <span class="theme-switcher-label">Theme</span>
                    <button type="button" class="theme-option" data-theme="green" aria-pressed="false" title="Classic green design">Classic</button>
                    <button type="button" class="theme-option theme-option-active" data-theme="saffron" aria-pressed="true" title="Saffron gold design">Saffron</button>
                    <button type="button" class="theme-option" data-theme="scientific" aria-pressed="false" title="Clean lab-style design">Lab</button>
                </div>
                <nav class="site-nav">
                    <a href="{% url 'saffron_home' %}" class="nav-btn {% if request.resolver_match.url_name == 'saffron_home' %}nav-btn-active{% endif %}">Home</a>
                    <a href="{% url 'saffron_about' %}" class="nav-btn {% if request.resolver_match.url_name == 'saffron_about' %}nav-btn-active{% endif %}">About</a>
                </nav>
            </div>
        </div>
    </header>
    <main class="container page-content">
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            var STORAGE_KEY = 'saffron-theme';
            var DEFAULT_THEME = 'saffron';
            var VALID = { green: 1, saffron: 1, scientific: 1 };

            function applyTheme(theme) {
                if (theme === 'amber') {
                    theme = DEFAULT_THEME;
                }
                if (!VALID[theme]) {
                    theme = DEFAULT_THEME;
                }
                document.documentElement.setAttribute('data-theme', theme);
                try {
                    localStorage.setItem(STORAGE_KEY, theme);
                } catch (e) { /* private browsing */ }
                document.querySelectorAll('.theme-option').forEach(function (btn) {
                    var active = btn.getAttribute('data-theme') === theme;
                    btn.classList.toggle('theme-option-active', active);
                    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.theme-option').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        applyTheme(btn.getAttribute('data-theme'));
                    });
                });
                var saved;
                try {
                    saved = localStorage.getItem(STORAGE_KEY);
                } catch (e) {
                    saved = null;
                }
                applyTheme(saved || document.documentElement.getAttribute('data-theme') || DEFAULT_THEME);
            });
        })();
    </script>
</body>
</html>
